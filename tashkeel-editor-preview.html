<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فصيح — Tashkeel Editor</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0B1220;
    --navy-light: #111B2E;
    --navy-mid: #162236;
    --teal: #2DD4BF;
    --teal-dim: rgba(45,212,191,0.15);
    --teal-glow: rgba(45,212,191,0.3);
    --text-primary: #E2E8F0;
    --text-secondary: #94A3B8;
    --text-muted: #64748B;
    --border: rgba(45,212,191,0.12);
    --danger: #F87171;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    line-height: 1.9;
    background: var(--navy);
    color: var(--text-primary);
    min-height: 100vh;
  }
  .container { max-width:1280px; margin:0 auto; padding:32px 24px; }

  /* Header */
  .header { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; padding-bottom:20px; border-bottom:1px solid var(--border); }
  .logo { display:flex; align-items:center; gap:12px; }
  .logo-icon { width:40px; height:40px; border-radius:10px; background:linear-gradient(135deg,var(--teal),#06B6D4); display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:700; color:var(--navy); }
  .logo-text { font-size:24px; font-weight:700; background:linear-gradient(135deg,var(--teal),#06B6D4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .logo-sub { font-size:13px; color:var(--text-muted); }
  .version { font-size:12px; color:var(--text-muted); }

  /* Dashboard */
  .dashboard { display:grid; grid-template-columns:1fr 380px; gap:24px; }
  @media(max-width:900px) { .dashboard { grid-template-columns:1fr; } }

  /* Card */
  .card { background:var(--navy-light); border:1px solid var(--border); border-radius:16px; padding:24px; position:relative; overflow:hidden; }
  .card::before { content:''; position:absolute; top:0; right:0; left:0; height:1px; background:linear-gradient(90deg,transparent,var(--teal-glow),transparent); }
  .card-title { font-size:15px; font-weight:600; color:var(--teal); margin-bottom:16px; display:flex; align-items:center; gap:8px; }
  .card-dot { width:8px; height:8px; border-radius:50%; background:var(--teal); box-shadow:0 0 8px var(--teal-glow); }

  /* Toggle */
  .mode-toggle { display:flex; border-radius:10px; overflow:hidden; border:1px solid var(--border); margin-bottom:16px; }
  .mode-btn { flex:1; padding:8px; border:none; background:var(--navy-mid); color:var(--text-secondary); font-family:'IBM Plex Sans Arabic',sans-serif; font-size:13px; cursor:pointer; transition:all .15s; }
  .mode-btn.active { background:var(--teal-dim); color:var(--teal); font-weight:600; }

  /* Textarea */
  .input-area { width:100%; min-height:140px; background:var(--navy-mid); border:1px solid var(--border); border-radius:12px; padding:16px; color:var(--text-primary); font-family:'IBM Plex Sans Arabic',sans-serif; font-size:18px; line-height:1.9; resize:vertical; direction:rtl; outline:none; transition:border-color .2s; }
  .input-area:focus { border-color:var(--teal); box-shadow:0 0 0 3px var(--teal-dim); }
  .input-area::placeholder { color:var(--text-muted); }

  /* Editor */
  .editor { background:var(--navy-mid); border:1px solid var(--border); border-radius:12px; padding:20px; min-height:140px; line-height:2.4; font-size:26px; cursor:default; position:relative; }
  .char { display:inline; cursor:pointer; padding:2px 1px; border-radius:4px; transition:background .15s; }
  .char.arabic:hover { background:var(--teal-dim); }
  .char.selected { background:var(--teal-dim); outline:2px solid var(--teal); outline-offset:1px; }
  .char.has-marks { color:var(--teal); }
  .char .mark { color:var(--teal); }

  /* Counter */
  .counter { display:flex; justify-content:space-between; margin-top:12px; font-size:12px; color:var(--text-muted); }
  .counter-badge { background:var(--navy-mid); padding:4px 10px; border-radius:6px; border:1px solid var(--border); }

  /* Buttons */
  .btn-row { display:flex; gap:10px; margin-top:16px; flex-wrap:wrap; }
  .btn { padding:10px 20px; border-radius:10px; border:none; font-family:'IBM Plex Sans Arabic',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:all .2s; display:flex; align-items:center; gap:8px; }
  .btn-primary { background:linear-gradient(135deg,var(--teal),#06B6D4); color:var(--navy); }
  .btn-primary:hover { box-shadow:0 4px 20px var(--teal-glow); transform:translateY(-1px); }
  .btn-primary:disabled { opacity:.5; cursor:not-allowed; transform:none; box-shadow:none; }
  .btn-secondary { background:var(--navy-mid); border:1px solid var(--border); color:var(--text-primary); }
  .btn-secondary:hover { border-color:var(--teal); }
  .btn-ghost { background:transparent; border:1px solid var(--border); color:var(--text-secondary); flex:1; font-size:12px; }
  .btn-ghost:hover { border-color:var(--teal); color:var(--text-primary); }

  /* Output */
  .output { background:var(--navy-mid); border:1px solid var(--border); border-radius:10px; padding:14px; font-size:13px; color:var(--text-secondary); max-height:100px; overflow-y:auto; margin-top:12px; }
  .output strong { color:var(--teal); font-size:11px; }

  /* Popover */
  .popover-overlay { position:fixed; inset:0; z-index:999; }
  .popover { position:fixed; z-index:1000; background:var(--navy-light); border:1px solid var(--teal); border-radius:14px; padding:16px; box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 30px var(--teal-dim); min-width:280px; animation:pop-in .18s ease-out; }
  @keyframes pop-in { from{opacity:0;transform:translateY(-6px) scale(.96)} to{opacity:1;transform:translateY(0) scale(1)} }
  .pop-header { display:flex; align-items:center; gap:10px; margin-bottom:12px; padding-bottom:10px; border-bottom:1px solid var(--border); }
  .pop-letter { font-size:28px; font-weight:700; color:var(--teal); min-width:36px; text-align:center; }
  .pop-label { font-size:13px; color:var(--text-secondary); }
  .pop-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:10px; }
  .pop-btn { display:flex; flex-direction:column; align-items:center; gap:2px; padding:8px 4px; border-radius:8px; border:1px solid var(--border); background:var(--navy-mid); color:var(--text-primary); cursor:pointer; transition:all .15s; font-family:'IBM Plex Sans Arabic',sans-serif; }
  .pop-btn:hover { border-color:var(--teal); background:var(--teal-dim); }
  .pop-btn.active { border-color:var(--teal); background:var(--teal-dim); box-shadow:0 0 8px var(--teal-dim); }
  .pop-btn-char { font-size:20px; line-height:1.2; }
  .pop-btn-label { font-size:10px; color:var(--text-muted); }
  .pop-remove { width:100%; padding:8px; border-radius:8px; border:1px solid rgba(248,113,113,.2); background:rgba(248,113,113,.08); color:var(--danger); cursor:pointer; font-family:'IBM Plex Sans Arabic',sans-serif; font-size:12px; transition:background .15s; }
  .pop-remove:hover { background:rgba(248,113,113,.15); }

  /* Voice Cards */
  .voice-card { display:flex; align-items:center; gap:12px; padding:12px; border-radius:10px; border:1px solid var(--border); background:var(--navy-mid); cursor:pointer; transition:all .15s; margin-bottom:8px; }
  .voice-card:hover,.voice-card.active { border-color:var(--teal); background:var(--teal-dim); }
  .voice-avatar { width:40px; height:40px; border-radius:10px; background:linear-gradient(135deg,var(--teal-dim),var(--navy)); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
  .voice-name { font-size:14px; font-weight:600; }
  .voice-desc { font-size:11px; color:var(--text-muted); }
  .voice-check { width:20px; height:20px; border-radius:50%; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:12px; margin-right:auto; direction:ltr; }
  .voice-card.active .voice-check { border-color:var(--teal); background:var(--teal); color:var(--navy); }

  /* Audio */
  .audio-player { background:var(--navy-mid); border:1px solid var(--border); border-radius:12px; padding:16px; display:flex; align-items:center; gap:12px; }
  .waveform { flex:1; height:40px; background:repeating-linear-gradient(90deg,var(--teal-dim) 0px,var(--teal-dim) 2px,transparent 2px,transparent 5px); border-radius:6px; opacity:.4; }
  .play-btn { width:40px; height:40px; border-radius:50%; background:var(--teal); border:none; color:var(--navy); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .play-btn:hover { box-shadow:0 0 16px var(--teal-glow); }

  /* Skeleton */
  .skel { background:linear-gradient(90deg,var(--navy-mid) 25%,var(--navy-light) 50%,var(--navy-mid) 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:6px; height:20px; margin-bottom:10px; }
  .skel:last-child { width:60%; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  .hidden { display:none; }
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">ف</div>
      <div>
        <div class="logo-text">فصيح</div>
        <div class="logo-sub">Fasseeh — Arabic TTS Studio</div>
      </div>
    </div>
    <div class="version">v0.1.0 — Tashkeel Editor</div>
  </header>

  <div class="dashboard">
    <!-- RIGHT: Editor -->
    <div>
      <div class="card">
        <div class="card-title"><span class="card-dot"></span> محرر التشكيل — Tashkeel Editor</div>

        <div class="mode-toggle">
          <button class="mode-btn active" id="modeInput" onclick="switchMode('input')">إدخال النص</button>
          <button class="mode-btn" id="modeEdit" onclick="switchMode('edit')">تحرير التشكيل</button>
        </div>

        <div id="inputView">
          <textarea class="input-area" id="rawInput" placeholder="اكتب النص العربي هنا...">بسم الله الرحمن الرحيم</textarea>
        </div>
        <div id="editorView" class="hidden"></div>
        <div id="skeletonView" class="hidden" style="background:var(--navy-mid);border:1px solid var(--border);border-radius:12px;padding:20px;min-height:140px;">
          <div class="skel" style="width:90%"></div>
          <div class="skel" style="width:75%"></div>
          <div class="skel"></div>
        </div>

        <div class="counter">
          <span id="hint">أدخل النص ثم انتقل لوضع التحرير</span>
          <span class="counter-badge"><span id="charCount">0</span> حرف</span>
        </div>

        <div class="btn-row" id="inputBtns">
          <button class="btn btn-primary" onclick="switchMode('edit')">✦ تحرير التشكيل</button>
        </div>
        <div class="btn-row hidden" id="editBtns">
          <button class="btn btn-primary" id="autoBtn" onclick="autoDiacritize()">✦ تشكيل تلقائي</button>
          <button class="btn btn-secondary" onclick="switchMode('input')">← العودة للإدخال</button>
        </div>

        <div id="outputBox" class="output hidden">
          <strong>النص النهائي (Unicode):</strong><br>
          <span id="outputText"></span>
        </div>
      </div>
    </div>

    <!-- LEFT: Sidebar -->
    <div>
      <div class="card" style="margin-bottom:20px">
        <div class="card-title"><span class="card-dot"></span> اختيار الصوت</div>
        <div class="voice-card active" onclick="selectVoice(this)">
          <div class="voice-avatar">🎙</div>
          <div><div class="voice-name">أحمد</div><div class="voice-desc">صوت رجالي — رسمي</div></div>
          <div class="voice-check">✓</div>
        </div>
        <div class="voice-card" onclick="selectVoice(this)">
          <div class="voice-avatar">🎤</div>
          <div><div class="voice-name">فاطمة</div><div class="voice-desc">صوت نسائي — دافئ</div></div>
          <div class="voice-check"></div>
        </div>
        <div class="voice-card" onclick="selectVoice(this)">
          <div class="voice-avatar">🎧</div>
          <div><div class="voice-name">يوسف</div><div class="voice-desc">صوت رجالي — شبابي</div></div>
          <div class="voice-check"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title"><span class="card-dot"></span> مشغل الصوت</div>
        <div class="audio-player">
          <button class="play-btn">▶</button>
          <div class="waveform"></div>
        </div>
        <div class="btn-row" style="margin-top:14px">
          <button class="btn btn-primary" style="flex:1">🔊 توليد الصوت</button>
        </div>
        <div class="btn-row">
          <button class="btn btn-ghost">↓ تحميل MP3</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Popover container -->
<div id="popoverOverlay" class="popover-overlay hidden" onclick="closePopover()"></div>
<div id="popover" class="popover hidden"></div>

<script>
// ─── Unicode Constants ─────────────────────────────────────────
const DIACRITICS = [
  { key:'fatha',    char:'\u064E', label:'فَتحة',   preview:'َ' },
  { key:'damma',    char:'\u064F', label:'ضَمّة',   preview:'ُ' },
  { key:'kasra',    char:'\u0650', label:'كَسرة',   preview:'ِ' },
  { key:'sukun',    char:'\u0652', label:'سُكون',   preview:'ْ' },
  { key:'shadda',   char:'\u0651', label:'شَدّة',   preview:'ّ' },
  { key:'fathatan', char:'\u064B', label:'فتحتان', preview:'ً' },
  { key:'dammatan', char:'\u064C', label:'ضمتان',  preview:'ٌ' },
  { key:'kasratan', char:'\u064D', label:'كسرتان', preview:'ٍ' },
];
const DIAC_SET = new Set(DIACRITICS.map(d=>d.char));
const SHADDA = '\u0651';
const ARABIC_RE = /[\u0600-\u06FF]/;

let segments = [];
let selectedIdx = null;
let currentMode = 'input';

// ─── Parse / Reconstruct ───────────────────────────────────────
function parse(text) {
  const segs = [];
  for (const ch of text) {
    if (DIAC_SET.has(ch)) {
      if (segs.length) segs[segs.length-1].marks.push(ch);
    } else {
      segs.push({ base:ch, marks:[] });
    }
  }
  return segs;
}

function reconstruct(segs) {
  return segs.map(s => s.base + s.marks.join('')).join('');
}

// ─── Render Editor ─────────────────────────────────────────────
function renderEditor() {
  const el = document.getElementById('editorView');
  el.innerHTML = '';
  el.className = 'editor';
  segments.forEach((seg, i) => {
    const span = document.createElement('span');
    const isArabic = ARABIC_RE.test(seg.base) && seg.base.trim();
    span.className = 'char' + (isArabic ? ' arabic' : '') + (i === selectedIdx ? ' selected' : '') + (seg.marks.length ? ' has-marks' : '');
    span.textContent = seg.base;
    seg.marks.forEach(m => {
      const mk = document.createElement('span');
      mk.className = 'mark';
      mk.textContent = m;
      span.appendChild(mk);
    });
    if (isArabic) {
      span.addEventListener('click', (e) => {
        e.stopPropagation();
        selectedIdx = i;
        renderEditor();
        showPopover(i, e.target);
      });
    }
    el.appendChild(span);
  });
  // Update output
  const out = reconstruct(segments);
  document.getElementById('outputText').textContent = out;
  document.getElementById('charCount').textContent = out.replace(/[\u064B-\u0652]/g,'').length;
}

// ─── Popover ───────────────────────────────────────────────────
function showPopover(idx, target) {
  const seg = segments[idx];
  const rect = target.getBoundingClientRect();
  const pop = document.getElementById('popover');
  const activeMarks = new Set(seg.marks);

  let html = `<div class="pop-header"><span class="pop-letter">${seg.base}</span><span class="pop-label">تشكيل الحرف</span></div>`;
  html += '<div class="pop-grid">';
  DIACRITICS.forEach(d => {
    const cls = activeMarks.has(d.char) ? ' active' : '';
    html += `<button class="pop-btn${cls}" onclick="event.stopPropagation();applyDiacritic(${idx},'${d.char}')"><span class="pop-btn-char">ـ${d.preview}</span><span class="pop-btn-label">${d.label}</span></button>`;
  });
  html += '</div>';
  html += `<button class="pop-remove" onclick="event.stopPropagation();removeMarks(${idx})">إزالة كل التشكيل</button>`;

  pop.innerHTML = html;
  pop.style.top = (rect.bottom + 8) + 'px';
  pop.style.left = (rect.left + rect.width/2) + 'px';
  pop.style.transform = 'translateX(-50%)';
  pop.classList.remove('hidden');
  document.getElementById('popoverOverlay').classList.remove('hidden');
}

function closePopover() {
  document.getElementById('popover').classList.add('hidden');
  document.getElementById('popoverOverlay').classList.add('hidden');
  selectedIdx = null;
  renderEditor();
}

function applyDiacritic(idx, char) {
  const seg = segments[idx];
  const has = seg.marks.indexOf(char);
  if (has >= 0) {
    seg.marks.splice(has, 1);
  } else {
    const isShadda = char === SHADDA;
    seg.marks = isShadda
      ? seg.marks.concat([char])
      : seg.marks.filter(m => m === SHADDA).concat([char]);
  }
  renderEditor();
  showPopover(idx, document.querySelector(`.char:nth-child(${idx+1})`));
}

function removeMarks(idx) {
  segments[idx].marks = [];
  closePopover();
}

// ─── Mode Switch ───────────────────────────────────────────────
function switchMode(mode) {
  currentMode = mode;
  const iv = document.getElementById('inputView');
  const ev = document.getElementById('editorView');
  const sv = document.getElementById('skeletonView');
  const ib = document.getElementById('inputBtns');
  const eb = document.getElementById('editBtns');
  const ob = document.getElementById('outputBox');
  const mi = document.getElementById('modeInput');
  const me = document.getElementById('modeEdit');

  if (mode === 'input') {
    iv.classList.remove('hidden'); ev.classList.add('hidden'); sv.classList.add('hidden');
    ib.classList.remove('hidden'); eb.classList.add('hidden'); ob.classList.add('hidden');
    mi.classList.add('active'); me.classList.remove('active');
    document.getElementById('hint').textContent = 'أدخل النص ثم انتقل لوضع التحرير';
    closePopover();
  } else {
    const raw = document.getElementById('rawInput').value;
    segments = parse(raw);
    iv.classList.add('hidden'); ev.classList.remove('hidden'); sv.classList.add('hidden');
    ib.classList.add('hidden'); eb.classList.remove('hidden'); ob.classList.remove('hidden');
    mi.classList.remove('active'); me.classList.add('active');
    document.getElementById('hint').textContent = 'اضغط على أي حرف لتعديل تشكيله';
    selectedIdx = null;
    renderEditor();
  }
}

// ─── Auto Diacritize (Mock) ────────────────────────────────────
async function autoDiacritize() {
  const ev = document.getElementById('editorView');
  const sv = document.getElementById('skeletonView');
  const btn = document.getElementById('autoBtn');
  ev.classList.add('hidden'); sv.classList.remove('hidden');
  btn.disabled = true; btn.textContent = '⏳ جارٍ التشكيل...';
  await new Promise(r => setTimeout(r, 1500));
  segments.forEach(s => {
    if (ARABIC_RE.test(s.base) && s.base.trim() && !s.marks.length) {
      s.marks.push('\u064E'); // Mock: add fatha
    }
  });
  sv.classList.add('hidden'); ev.classList.remove('hidden');
  btn.disabled = false; btn.textContent = '✦ تشكيل تلقائي';
  renderEditor();
}

// ─── Voice Selection ───────────────────────────────────────────
function selectVoice(el) {
  document.querySelectorAll('.voice-card').forEach(c => { c.classList.remove('active'); c.querySelector('.voice-check').textContent = ''; });
  el.classList.add('active');
  el.querySelector('.voice-check').textContent = '✓';
}

// ─── Init ──────────────────────────────────────────────────────
document.getElementById('charCount').textContent = document.getElementById('rawInput').value.length;
document.getElementById('rawInput').addEventListener('input', function() {
  document.getElementById('charCount').textContent = this.value.replace(/[\u064B-\u0652]/g,'').length;
});
</script>
</body>
</html>
